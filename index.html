        // 批量生成所有学生打印页面 - 使用浏览器原生打印获得矢量PDF
        async function generateAllStudentsPrint(totalStudents, printAllBtn, originalTitle) {
            return new Promise(async (resolve) => {
                const originalCurrentRowIndex = currentRowIndex;
                const mainContainer = document.getElementById('main-container');

                try {
                    // 创建临时打印容器
                    const printContainer = document.createElement('div');
                    printContainer.id = 'batch-print-container';
                    printContainer.style.cssText = `
                        position: absolute;
                        left: -9999px;
                        top: 0;
                        width: 210mm;
                        background: white;
                        padding: 0;
                        box-sizing: border-box;
                    `;
                    document.body.appendChild(printContainer);

                    // 为每个学生生成打印页面
                    for (let i = 0; i < totalStudents; i++) {
                        const studentName = parsedSheets.total.rows[i][0];
                        if (!studentName || studentName.trim() === '') continue;

                        printAllBtn.textContent = `正在准备 ${i + 1}/${totalStudents}: ${studentName}`;

                        // 设置当前学生数据并更新显示
                        currentRowIndex = i;
                        updateStudentDisplay(studentName, echartsInstances, i);

                        // 等待图表完全渲染
                        await new Promise(resolve => setTimeout(resolve, 1500));

                        // 隐藏科目折线图的网格线（用于打印），保留总分图和雷达图
                        const subjectCharts = [...Object.values(echartsInstances.subjects || {})];
                        subjectCharts.forEach(chart => {
                            if (chart && chart.getOption) {
                                try {
                                    const option = chart.getOption();
                                    if (option.xAxis && option.xAxis[0]) {
                                        option.xAxis[0].splitLine = { show: false };
                                    }
                                    if (option.yAxis && option.yAxis[0]) {
                                        option.yAxis[0].splitLine = { show: false };
                                    }
                                    chart.setOption(option, false);
                                } catch (e) { }
                            }
                        });

                        // 等待图表更新
                        await new Promise(resolve => setTimeout(resolve, 200));

                        // 克隆主容器内容
                        const pageContent = mainContainer.cloneNode(true);

                        // 移除控制面板和导航按钮
                        const controlsPanel = pageContent.querySelector('.controls-panel');
                        const navButtons = pageContent.querySelector('.nav-buttons');
                        if (controlsPanel) controlsPanel.remove();
                        if (navButtons) navButtons.remove();

                        // 设置打印页面样式（强制A4尺寸，分页）
                        // 设置打印页面样式（强制 A4 尺寸，锁死高度防止溢出分页）
                        pageContent.style.cssText = `
                            width: 210mm;
                            height: 297mm; 
                            padding: 10mm;
                            box-sizing: border-box;
                            background: white;
                            page-break-after: always;
                            break-after: page;
                            position: relative;
                            overflow: hidden;
                        `;

                        printContainer.appendChild(pageContent);

                        // 每处理3个学生进行一次内存清理
                        if ((i + 1) % 3 === 0) {
                            if (window.gc) window.gc();
                            await new Promise(resolve => setTimeout(resolve, 100));
                        }
                    }

                    printAllBtn.textContent = '正在启动打印...';

                    // 准备打印：隐藏主容器，显示打印容器
                    mainContainer.style.display = 'none';
                    printContainer.style.position = 'static';
                    printContainer.style.left = '0';

                    // 更新页面标题
                    const currentDate = new Date().toISOString().slice(0, 10);
                    document.title = `学生成绩分析报告_${currentDate}_${totalStudents}人`;

                    // 等待DOM更新
                    await new Promise(resolve => setTimeout(resolve, 500));

                    // 触发打印
                    window.print();

                    // 打印完成后恢复
                    setTimeout(() => {
                        // 恢复主容器
                        mainContainer.style.display = '';

                        // 移除打印容器
                        if (printContainer.parentNode) {
                            printContainer.parentNode.removeChild(printContainer);
                        }

                        // 恢复原始状态
                        currentRowIndex = originalCurrentRowIndex;
                        document.title = originalTitle;
                        updateStudentDisplay();

                        // 恢复科目折线图的网格线显示
                        setTimeout(() => {
                            const subjectCharts = [...Object.values(echartsInstances.subjects || {})];
                            subjectCharts.forEach(chart => {
                                if (chart && chart.getOption) {
                                    try {
                                        const option = chart.getOption();
                                        if (option.xAxis && option.xAxis[0]) {
                                            option.xAxis[0].splitLine = { show: true };
                                        }
                                        if (option.yAxis && option.yAxis[0]) {
                                            option.yAxis[0].splitLine = { show: true };
                                        }
                                        chart.setOption(option, false);
                                    } catch (e) { }
                                }
                            });
                        }, 100);

                        printAllBtn.textContent = '导出完成！';

                        if (window.gc) window.gc();

                        resolve();
                    }, 1000);

                } catch (error) {
                    console.error(`批量打印时出错:`, error);

                    // 恢复主容器
                    mainContainer.style.display = '';

                    // 移除打印容器
                    const printContainer = document.getElementById('batch-print-container');
                    if (printContainer && printContainer.parentNode) {
                        printContainer.parentNode.removeChild(printContainer);
                    }

                    // 恢复原始状态
                    currentRowIndex = originalCurrentRowIndex;
                    document.title = originalTitle;
                    updateStudentDisplay();

                    alert('导出时出错：' + error.message);
                    resolve();
                }
            });
        }

        // 切换学生
        document.getElementById('prevStudent').addEventListener('click', function() {
            const maxRows = parsedSheets.total.rows.length;
            if (maxRows === 0) return;
            currentRowIndex = (currentRowIndex - 1 + maxRows) % maxRows;
            updateStudentDisplay();
        });
        
        document.getElementById('nextStudent').addEventListener('click', function() {
            const maxRows = parsedSheets.total.rows.length;
            if (maxRows === 0) return;
            currentRowIndex = (currentRowIndex + 1) % maxRows;
            updateStudentDisplay();
        });

        // 更新图表标题
        function updateChartTitles() {
            const isRankingMode = displayMode === 'ranking';
            
            // 更新总分图表标题
            const totalTitle = document.getElementById('totalChartTitle');
            if (totalTitle) {
                totalTitle.textContent = isRankingMode ? '总分排名变化' : '总分分数变化';
            }
            
            // 更新雷达图标题
            const radarTitle = document.getElementById('radarChartTitle');
            if (radarTitle) {
                radarTitle.textContent = isRankingMode ? '雷达图（值越小越好）' : '雷达图（值越大越好）';
            }
            
            // 更新科目图表标题
            const subjectsTitle = document.getElementById('subjectsChartTitle');
            if (subjectsTitle) {
                subjectsTitle.textContent = isRankingMode ? '各科目排名变化' : '各科目分数变化';
            }
        }

        // 自定义控件事件
        document.querySelector('.customization-controls').addEventListener('input', (e) => {
             const id = e.target.id;
             if(id.includes('Slider')) {
                document.getElementById(id.replace('Slider', 'Value')).textContent = e.target.value + 'px';
             }
             if (parsedSheets.total && parsedSheets.total.rows.length > 0) {
                updateStudentDisplay();
             }
        });
        document.querySelector('.customization-controls').addEventListener('change', (e) => {
             const id = e.target.id;
             
             // 处理显示模式切换
             if (id === 'displayModeSelect') {
                 const newMode = e.target.value;
                 if (newMode !== displayMode) {
                     displayMode = newMode;
                     updateChartTitles();
                     if (parsedSheets.total && parsedSheets.total.rows.length > 0) {
                         updateStudentDisplay();
                     }
                 }
                 return;
             }
             
             if (parsedSheets.total && parsedSheets.total.rows.length > 0) {
                updateStudentDisplay();
             }
        });

        // --- 搜索功能 (保持不变) ---
        const searchInput = document.getElementById('studentSearch');
        const dropdown = document.getElementById('autocompleteDropdown');
        let filteredStudents = [];
        let autocompleteIndex = -1;

        searchInput.addEventListener('input', function() {
            const searchText = this.value.trim().toLowerCase();
            if (!searchText || !parsedSheets.total) {
                dropdown.classList.remove('show');
                return;
            }
            // 确保只搜索第一列 (姓名)
            const allStudents = (parsedSheets.total.rows || []).map((row, index) => ({ name: String(row[0]).trim(), index }));
            filteredStudents = allStudents.filter(s => s.name && s.name.toLowerCase().includes(searchText));
            
            if (filteredStudents.length > 0) {
                dropdown.innerHTML = filteredStudents.map((s, i) => `<div class="autocomplete-item" data-index="${i}">${s.name}</div>`).join('');
            } else {
                dropdown.innerHTML = '<div class="no-results">未找到匹配的学生</div>';
            }
            dropdown.classList.add('show');
            autocompleteIndex = -1;
        });

        dropdown.addEventListener('click', function(e) {
            if (e.target.classList.contains('autocomplete-item')) {
                selectStudent(parseInt(e.target.dataset.index));
            }
        });

        function selectStudent(selectedIndex) {
            const student = filteredStudents[selectedIndex];
            if (student) {
                currentRowIndex = student.index;
                updateStudentDisplay();
                searchInput.value = student.name;
                dropdown.classList.remove('show');
            }
        }
        
        // 键盘导航
        searchInput.addEventListener('keydown', function(e) {
            const items = dropdown.querySelectorAll('.autocomplete-item');
            if(items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                autocompleteIndex = (autocompleteIndex + 1) % items.length;
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                autocompleteIndex = (autocompleteIndex - 1 + items.length) % items.length;
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (autocompleteIndex > -1) {
                    selectStudent(autocompleteIndex);
                } else if(filteredStudents.length > 0) {
                    selectStudent(0);
                }
                return;
            } else if (e.key === 'Escape') {
                dropdown.classList.remove('show');
                return;
            } else {
                return; // 其他按键不处理
            }
            
            items.forEach((item, i) => {
                item.classList.toggle('active', i === autocompleteIndex);
            });
        });

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
        
        // 页面加载完成
        window.onload = () => {
            initCharts();
            initFileQueueInteractions();
        };
        
        // 辅助函数：根据姓名查找行数据 (保持不变)
        function findRowByName(dataset, name) {
            if (!dataset || !dataset.rows || !name) return null;
            return dataset.rows.find(r => String(r[0]).trim() === String(name).trim());
        }

        // 辅助函数：检查某列是否有数据（除第一行表头外）
        function hasColumnData(dataset, columnIndex) {
            if (!dataset || !dataset.rows || dataset.rows.length === 0) return false;
            // 检查该列在所有数据行中是否至少有一个非空值
            return dataset.rows.some(row => {
                const value = row[columnIndex];
                return value !== null && value !== '' && value !== undefined;
            });
        }

        // 辅助函数：提取用于图表的数据 (包含标签和值)
        function findRowData(dataset, name) {
            const row = findRowByName(dataset, name);
            let labels = [], values = [];
            if (row && dataset && dataset.headers) {
                // 默认假设第一列是姓名，从第二列开始是数据
                const headers = dataset.headers.slice(1);
                const rowValues = row.slice(1);
                
                if (headers && rowValues) {
                    headers.forEach((header, i) => {
                        // 【修复点 1】改进数据解析逻辑，确保缺失数据以 null 填充
                        let rawValue = rowValues[i];
                        let value = parseFloat(rawValue);

                        // 如果解析失败，尝试从字符串中清理非数字部分再解析 (例如："30.5排名")
                        if (isNaN(value) && typeof rawValue === 'string' && rawValue !== '') {
                            const cleaned = rawValue.replace(/[^\d.]/g, '');
                            value = parseFloat(cleaned);
                        }

                        // 只有当该列有数据时才计入（检查整个数据集的该列，索引需要+1因为第一列是姓名）
                        if (header && hasColumnData(dataset, i + 1)) { 
                            labels.push(header);
                            // 如果值仍为 NaN 或 null，则将其设为 null (ECharts 会绘制为间断)
                            const finalValue = isNaN(value) || rawValue === null || rawValue === '' ? null : value;
                            values.push(finalValue);
                        }
                    });
                }
            }
            return { labels, values };
        }
        
        // 获取当前UI控件的配置 (保持不变)
        function getChartConfig() {
            const fontSize = document.getElementById('fontSizeSlider').value;
            // 确保在批量导出时，DOM 不存在时不会报错
            if (document.documentElement) {
                document.documentElement.style.setProperty('--chart-font-size', fontSize + 'px');
            }
            return {
                fontSize: parseInt(fontSize),
                lineColor: document.getElementById('lineColorPicker')?.value || '#5470c6',
                pointStyle: document.getElementById('pointStyleSelect')?.value || 'circle',
                pointSize: Number(document.getElementById('pointSizeSlider')?.value || 4),
                lineWidth: Number(document.getElementById('lineWidthSlider')?.value || 2),
                showLabels: document.getElementById('showDataLabels')?.checked || false,
            };
        }

    </script>
</body>
</html>
